version = 1

# Node-only scripts that legitimately use console.log (migrations,
# dev orchestrator, safety helpers). DeepSource's "no console in
# browser code" (JS-0002) misclassifies these as browser modules.
exclude_patterns = ["nextjs/scripts/**"]

# Treat Cypress specs + Vitest files as tests so DeepSource downgrades
# anti-pattern rules that target production code. JS-0354 in particular
# fires on Chai's BDD getter idiom (`expect(x).to.exist`) — a no-op-
# looking expression that is actually the recommended assertion.
test_patterns = [
  "nextjs/cypress/e2e/**/*.cy.ts",
  "nextjs/cypress/tasks/**/*.ts",
  "nextjs/src/**/*.test.ts",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  # The JS analyzer's "browser-only" defaults misclassify our Node
  # scripts + tooling. Declaring environments here makes DeepSource
  # apply the right rule set per file (Cypress globals, Vitest mocks,
  # Node modules), which silences a separate batch of false positives
  # the `exclude_patterns` + `test_patterns` pair don't cover.
  environment = ["nodejs", "browser", "cypress", "vitest"]

[[transformers]]
name = "prettier"
enabled = true
