name: CI

on:
  push:
    branches:
      - master
      - "feat/**"
  pull_request:
    branches:
      - master

defaults:
  run:
    working-directory: nextjs

jobs:
  unit:
    name: Typecheck + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

  cypress:
    name: Cypress (Mongo memory + build + start + run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Cypress
        run: npm run cy:test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: nextjs/cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7

  a11y:
    name: Lighthouse a11y (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Lighthouse a11y
        run: npm run a11y

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: nextjs/.lighthouseci/
          if-no-files-found: ignore
          retention-days: 30
