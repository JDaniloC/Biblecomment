<!doctype html>
<html lang="pt-BR">
  <head><meta charset="utf-8" /><title>Bible Comment</title></head>
  <body style="margin:0;background:#1075d3">
    <script type="module">
      import { StatusBar, Style } from "https://cdn.jsdelivr.net/npm/@capacitor/status-bar/dist/esm/index.js";
      const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      StatusBar.setStyle({ style: dark ? Style.Dark : Style.Light }).catch(() => {});
    </script>
  </body>
</html>
